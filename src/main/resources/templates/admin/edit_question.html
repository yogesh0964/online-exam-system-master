<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Question — EduExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#6c63ff;--accent:#f59e0b;--success:#10b981;--dark:#0f0e17;--surface:#1a1829;--card:#221f35;--text:#fffffe;--muted:#a7a5be;--border:rgba(108,99,255,0.12);}
        *{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
        h1,h2,h3{font-family:'Syne',sans-serif;}
        .main{padding:2rem 0 4rem;}
        .breadcrumb-dark{display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;font-size:0.85rem;color:var(--muted);flex-wrap:wrap;}
        .breadcrumb-dark a{color:var(--muted);text-decoration:none;}
        .breadcrumb-dark a:hover{color:var(--text);}
        .breadcrumb-dark i.sep{font-size:0.7rem;opacity:0.5;}
        .page-header{margin-bottom:1.5rem;}
        .page-header h2{font-size:1.5rem;font-weight:800;margin:0;letter-spacing:-0.5px;}
        .page-header p{color:var(--muted);margin:0.2rem 0 0;font-size:0.88rem;}
        .edit-badge{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--accent);border-radius:50px;padding:0.25rem 0.8rem;font-size:0.78rem;font-weight:600;margin-bottom:1.25rem;}
        .form-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:1rem;}
        .form-card-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
        .form-card-header h5{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0;}
        .form-card-body{padding:1.5rem;}
        .field-group{margin-bottom:1.2rem;}
        .field-label{font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:0.45rem;}
        .field-input,.field-textarea{width:100%;background:var(--surface);border:1.5px solid rgba(255,255,255,0.07);color:var(--text);padding:0.8rem 1rem;border-radius:11px;font-size:0.92rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;resize:vertical;}
        .field-input:focus,.field-textarea:focus{outline:none;border-color:var(--accent);background:rgba(245,158,11,0.04);box-shadow:0 0 0 4px rgba(245,158,11,0.1);color:var(--text);}
        .field-input::placeholder,.field-textarea::placeholder{color:rgba(167,165,190,0.5);}
        .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        @media(max-width:600px){.options-grid{grid-template-columns:1fr;}}
        .option-label-wrap{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.45rem;}
        .option-num{width:22px;height:22px;border-radius:50%;background:rgba(245,158,11,0.15);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;flex-shrink:0;}
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        @media(max-width:500px){.two-col{grid-template-columns:1fr;}}
        .form-actions{display:flex;gap:0.75rem;margin-top:1rem;}
        .btn-update{flex:1;background:var(--accent);color:#0f0e17;border:none;border-radius:12px;padding:0.9rem;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 6px 20px rgba(245,158,11,0.25);}
        .btn-update:hover{background:#e08d00;transform:translateY(-2px);}
        .btn-cancel{background:rgba(255,255,255,0.06);color:var(--muted);border:none;border-radius:12px;padding:0.9rem 1.5rem;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;justify-content:center;}
        .btn-cancel:hover{background:rgba(255,255,255,0.1);color:var(--text);}
            .btn-back-float{position:fixed;bottom:2rem;left:2rem;z-index:999;display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,#6c63ff,#4f46e5);color:white !important;border:none;border-radius:50px;padding:0.7rem 1.4rem;font-size:0.88rem;font-weight:700;font-family:'Syne',sans-serif;text-decoration:none;box-shadow:0 8px 25px rgba(108,99,255,0.4);transition:all 0.25s;}
        .btn-back-float:hover{transform:translateY(-3px);box-shadow:0 14px 35px rgba(108,99,255,0.55);background:linear-gradient(135deg,#4f46e5,#3730a3);}
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container main">
    <div style="max-width:720px;margin:0 auto;">

        <div class="breadcrumb-dark">
            <a th:href="@{/admin/dashboard}"><i class="bi bi-house-fill"></i> Dashboard</a>
            <i class="bi bi-chevron-right sep"></i>
            <a th:href="@{/admin/manage-exams}">Manage Exams</a>
            <i class="bi bi-chevron-right sep"></i>
            <a th:href="@{/admin/exam/manage-questions/{id}(id=${question.exam.id})}">Questions</a>
            <i class="bi bi-chevron-right sep"></i>
            <span style="color:var(--text);">Edit Question</span>
        </div>

        <div class="page-header">
            <h2>Edit Question</h2>
            <p>Modify the question text, options, answer or marks</p>
        </div>

        <form th:action="@{/admin/question/update/{id}(id=${question.id})}" th:object="${question}" method="post">

            <div class="form-card">
                <div class="form-card-header"><h5><i class="bi bi-question-circle-fill me-2" style="color:var(--primary)"></i>Question Text</h5></div>
                <div class="form-card-body" style="padding-bottom:1rem;">
                    <div class="edit-badge"><i class="bi bi-pencil-fill"></i> Editing question</div>
                    <div class="field-group" style="margin:0;">
                        <textarea class="field-textarea" th:field="*{text}" rows="3" required></textarea>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <div class="form-card-header"><h5><i class="bi bi-list-ul me-2" style="color:var(--success)"></i>Answer Options</h5></div>
                <div class="form-card-body">
                    <div class="options-grid">
                        <div class="field-group">
                            <div class="option-label-wrap"><div class="option-num">1</div><label class="field-label" style="margin:0;">Option 1</label></div>
                            <input type="text" class="field-input" th:field="*{option1}" required>
                        </div>
                        <div class="field-group">
                            <div class="option-label-wrap"><div class="option-num">2</div><label class="field-label" style="margin:0;">Option 2</label></div>
                            <input type="text" class="field-input" th:field="*{option2}" required>
                        </div>
                        <div class="field-group">
                            <div class="option-label-wrap"><div class="option-num">3</div><label class="field-label" style="margin:0;">Option 3</label></div>
                            <input type="text" class="field-input" th:field="*{option3}" required>
                        </div>
                        <div class="field-group" style="margin:0;">
                            <div class="option-label-wrap"><div class="option-num">4</div><label class="field-label" style="margin:0;">Option 4</label></div>
                            <input type="text" class="field-input" th:field="*{option4}" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <div class="form-card-header"><h5><i class="bi bi-check-circle-fill me-2" style="color:var(--success)"></i>Answer & Marks</h5></div>
                <div class="form-card-body">
                    <div class="two-col">
                        <div class="field-group" style="margin:0;">
                            <label class="field-label">Correct Answer (1–4)</label>
                            <input type="number" class="field-input" th:field="*{correctAnswer}" min="1" max="4" required>
                        </div>
                        <div class="field-group" style="margin:0;">
                            <label class="field-label">Marks</label>
                            <input type="number" class="field-input" th:field="*{marks}" min="1" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/exam/manage-questions/{id}(id=${question.exam.id})}" class="btn-cancel"><i class="bi bi-x me-1"></i> Cancel</a>
                <button type="submit" class="btn-update"><i class="bi bi-check-lg"></i> Update Question</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<a onclick="history.back()" class="btn-back-float"><i class="bi bi-arrow-left-circle-fill"></i> Back</a>
</body>
</html>
