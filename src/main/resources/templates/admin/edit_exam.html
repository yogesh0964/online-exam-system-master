<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Exam — EduExam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#6c63ff;--primary-dark:#4f46e5;--accent:#f59e0b;--dark:#0f0e17;--surface:#1a1829;--card:#221f35;--text:#fffffe;--muted:#a7a5be;--border:rgba(108,99,255,0.12);}
    *{box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
    h1,h2,h3{font-family:'Syne',sans-serif;}
    .main{padding:2rem 0 4rem;}
    .page-wrap{max-width:600px;margin:0 auto;}
    .breadcrumb-dark{display:flex;align-items:center;gap:0.5rem;margin-bottom:2rem;font-size:0.85rem;color:var(--muted);}
    .breadcrumb-dark a{color:var(--muted);text-decoration:none;}
    .breadcrumb-dark a:hover{color:var(--text);}
    .breadcrumb-dark i{font-size:0.7rem;opacity:0.5;}
    .form-card{background:var(--card);border:1px solid var(--border);border-radius:22px;overflow:hidden;}
    .form-card-header{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;}
    .form-card-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(245,158,11,0.3),rgba(245,158,11,0.1));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
    .form-card-header h2{font-size:1.5rem;font-weight:800;margin:0;}
    .form-card-header p{color:var(--muted);font-size:0.88rem;margin:0.2rem 0 0;}
    .form-card-body{padding:2rem;}
    .field-group{margin-bottom:1.5rem;}
    .field-label{font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:0.5rem;}
    .field-input{width:100%;background:var(--surface);border:1.5px solid rgba(255,255,255,0.07);color:var(--text);padding:0.85rem 1rem;border-radius:12px;font-size:0.95rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .field-input:focus{outline:none;border-color:var(--accent);background:rgba(245,158,11,0.04);box-shadow:0 0 0 4px rgba(245,158,11,0.1);color:var(--text);}
    .field-input::placeholder{color:rgba(167,165,190,0.5);}
    .edit-badge{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--accent);border-radius:50px;padding:0.3rem 0.9rem;font-size:0.78rem;font-weight:600;margin-bottom:1.5rem;}
    .form-actions{display:flex;gap:0.75rem;margin-top:0.5rem;}
    .btn-update{flex:1;background:var(--accent);color:#0f0e17;border:none;border-radius:12px;padding:0.9rem;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 6px 20px rgba(245,158,11,0.25);}
    .btn-update:hover{background:#e08d00;transform:translateY(-2px);box-shadow:0 10px 25px rgba(245,158,11,0.35);}
    .btn-cancel{background:rgba(255,255,255,0.06);color:var(--muted);border:none;border-radius:12px;padding:0.9rem 1.5rem;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;justify-content:center;}
    .btn-cancel:hover{background:rgba(255,255,255,0.1);color:var(--text);}
          .btn-back-float{position:fixed;bottom:2rem;left:2rem;z-index:999;display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,#6c63ff,#4f46e5);color:white !important;border:none;border-radius:50px;padding:0.7rem 1.4rem;font-size:0.88rem;font-weight:700;font-family:'Syne',sans-serif;text-decoration:none;box-shadow:0 8px 25px rgba(108,99,255,0.4);transition:all 0.25s;}
        .btn-back-float:hover{transform:translateY(-3px);box-shadow:0 14px 35px rgba(108,99,255,0.55);background:linear-gradient(135deg,#4f46e5,#3730a3);}
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container main">
  <div class="page-wrap">

    <div class="breadcrumb-dark">
      <a th:href="@{/admin/dashboard}"><i class="bi bi-house-fill"></i> Dashboard</a>
      <i class="bi bi-chevron-right"></i>
      <a th:href="@{/admin/manage-exams}">Manage Exams</a>
      <i class="bi bi-chevron-right"></i>
      <span style="color:var(--text);">Edit Exam</span>
    </div>

    <div class="form-card">
      <div class="form-card-header">
        <div class="form-card-icon">✏️</div>
        <div>
          <h2>Edit Exam</h2>
          <p>Update the exam title or duration below</p>
        </div>
      </div>
      <div class="form-card-body">
        <div class="edit-badge"><i class="bi bi-pencil-fill"></i> Editing existing exam</div>

        <form th:action="@{/admin/exam/update/{id}(id=${exam.id})}" th:object="${exam}" method="post">
          <div class="field-group">
            <label class="field-label">Exam Title</label>
            <input type="text" class="field-input" th:field="*{title}" required>
          </div>
          <div class="field-group">
            <label class="field-label">Duration (minutes)</label>
            <input type="number" class="field-input" th:field="*{durationInMinutes}" min="1" required>
          </div>
          <div class="form-actions">
            <a th:href="@{/admin/manage-exams}" class="btn-cancel"><i class="bi bi-x me-1"></i> Cancel</a>
            <button type="submit" class="btn-update"><i class="bi bi-check-lg"></i> Update Exam</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<a onclick="history.back()" class="btn-back-float"><i class="bi bi-arrow-left-circle-fill"></i> Back</a>
</body>
</html>
