<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Exams — EduExam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6c63ff; --primary-dark: #4f46e5; --accent: #f59e0b;
      --dark: #0f0e17; --surface: #1a1829; --card: #221f35;
      --text: #fffffe; --muted: #a7a5be;
      --success: #10b981; --danger: #ef4444; --info: #0ea5e9;
      --border: rgba(108,99,255,0.12);
    }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

    .main { padding: 2rem 0 4rem; }

    /* PAGE HEADER */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-header-left { display: flex; align-items: center; gap: 1rem; }
    .page-icon { width: 54px; height: 54px; border-radius: 14px; background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(108,99,255,0.1)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .page-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
    .page-sub { color: var(--muted); font-size: 0.9rem; margin: 0; }
    .btn-create {
      background: var(--primary); color: white; border: none; border-radius: 50px;
      padding: 0.65rem 1.5rem; font-size: 0.92rem; font-weight: 700;
      font-family: 'Syne', sans-serif; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
      transition: all 0.25s; box-shadow: 0 6px 20px rgba(108,99,255,0.3);
    }
    .btn-create:hover { background: var(--primary-dark); color: white; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(108,99,255,0.4); }

    /* STATS ROW */
    .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 0.5rem 1.2rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
    .stat-chip i { color: var(--primary); }
    .stat-chip strong { color: var(--text); }

    /* EXAM CARDS GRID */
    .exams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }

    .exam-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      transition: all 0.3s; position: relative;
    }
    .exam-card:hover { transform: translateY(-4px); border-color: rgba(108,99,255,0.3); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
    .exam-card-top { padding: 1.5rem 1.5rem 1rem; }
    .exam-card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .exam-card-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .exam-meta { display: flex; gap: 1rem; flex-wrap: wrap; }
    .meta-chip { display: flex; align-items: center; gap: 0.3rem; color: var(--muted); font-size: 0.82rem; }
    .meta-chip i { color: var(--primary); opacity: 0.7; }
    .exam-card-divider { height: 1px; background: var(--border); margin: 0 1.5rem; }
    .exam-card-actions { padding: 1rem 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .btn-a { padding: 0.35rem 0.8rem; border-radius: 8px; font-size: 0.78rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem; }
    .ba-green  { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .ba-green:hover  { background: rgba(16,185,129,0.28); color: #6ee7b7; }
    .ba-blue   { background: rgba(14,165,233,0.15); color: #7dd3fc; }
    .ba-blue:hover   { background: rgba(14,165,233,0.28); color: #7dd3fc; }
    .ba-purple { background: rgba(108,99,255,0.15); color: #a78bfa; }
    .ba-purple:hover { background: rgba(108,99,255,0.28); color: #a78bfa; }
    .ba-yellow { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .ba-yellow:hover { background: rgba(245,158,11,0.28); color: #fcd34d; }
    .ba-red    { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .ba-red:hover    { background: rgba(239,68,68,0.28); color: #fca5a5; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-state i { font-size: 4rem; color: var(--primary); opacity: 0.2; display: block; margin-bottom: 1rem; }
    .empty-state h4 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .empty-state p { color: var(--muted); margin-bottom: 1.5rem; }

    /* COLOR ACCENTS per card */
    .accent-bar { height: 3px; width: 100%; }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container main">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-icon">📋</div>
      <div>
        <h1 class="page-title">Manage Exams</h1>
        <p class="page-sub">Create, edit, and manage all your exams</p>
      </div>
    </div>
    <a th:href="@{/admin/exam/add}" class="btn-create">
      <i class="bi bi-plus-lg"></i> Create New Exam
    </a>
  </div>

  <!-- EMPTY STATE -->
  <div th:if="${#lists.isEmpty(exams)}" class="empty-state">
    <i class="bi bi-journal-x"></i>
    <h4>No Exams Yet</h4>
    <p>Create your first exam and start adding questions.</p>
    <a th:href="@{/admin/exam/add}" class="btn-create">
      <i class="bi bi-plus-lg"></i> Create First Exam
    </a>
  </div>

  <!-- EXAMS GRID -->
  <div class="exams-grid" th:if="${!#lists.isEmpty(exams)}">
    <div th:each="exam, iterStat : ${exams}" class="exam-card">

      <!-- Color accent bar -->
      <div class="accent-bar" th:style="${iterStat.index % 4 == 0 ? 'background:linear-gradient(90deg,#6c63ff,#a78bfa)' : (iterStat.index % 4 == 1 ? 'background:linear-gradient(90deg,#10b981,#34d399)' : (iterStat.index % 4 == 2 ? 'background:linear-gradient(90deg,#f59e0b,#fbbf24)' : 'background:linear-gradient(90deg,#0ea5e9,#38bdf8)'))}"></div>

      <div class="exam-card-top">
        <div class="exam-card-icon"
             th:text="${iterStat.index % 4 == 0 ? '📐' : (iterStat.index % 4 == 1 ? '💻' : (iterStat.index % 4 == 2 ? '🧪' : '📖'))}">📋</div>
        <div class="exam-card-title" th:text="${exam.title}">Exam Title</div>
        <div class="exam-meta">
          <div class="meta-chip"><i class="bi bi-clock-fill"></i> <span th:text="${exam.durationInMinutes} + ' minutes'">60 minutes</span></div>
          <div class="meta-chip"><i class="bi bi-question-circle-fill"></i> <span th:text="${#lists.size(exam.questions)} + ' questions'">0 questions</span></div>
        </div>
      </div>

      <div class="exam-card-divider"></div>

      <div class="exam-card-actions">
        <a th:href="@{/admin/exam/{id}/question/add(id=${exam.id})}" class="btn-a ba-green">
          <i class="bi bi-plus-lg"></i> Add Q
        </a>
        <a th:href="@{/admin/results/{id}(id=${exam.id})}" class="btn-a ba-blue">
          <i class="bi bi-bar-chart-fill"></i> Results
        </a>
        <a th:href="@{/admin/exam/manage-questions/{id}(id=${exam.id})}" class="btn-a ba-purple">
          <i class="bi bi-list-task"></i> Manage
        </a>
        <a th:href="@{/admin/exam/edit/{id}(id=${exam.id})}" class="btn-a ba-yellow">
          <i class="bi bi-pencil-fill"></i> Edit
        </a>
        <a th:href="@{/admin/exam/delete/{id}(id=${exam.id})}" class="btn-a ba-red"
           onclick="return confirm('Delete this exam? All questions and results will also be deleted.')">
          <i class="bi bi-trash-fill"></i> Delete
        </a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
