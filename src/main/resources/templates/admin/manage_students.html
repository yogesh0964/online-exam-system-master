<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Manage Students — EduExam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6c63ff; --primary-dark: #4f46e5; --accent: #f59e0b;
      --dark: #0f0e17; --surface: #1a1829; --card: #221f35;
      --text: #fffffe; --muted: #a7a5be;
      --success: #10b981; --danger: #ef4444; --info: #0ea5e9;
      --border: rgba(108,99,255,0.12);
    }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

    .main { padding: 2rem 0 4rem; }

    /* ALERTS */
    .alert-success-dark { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; border-radius: 12px; padding: 0.85rem 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .alert-error-dark { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 12px; padding: 0.85rem 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .alert-close { background: none; border: none; cursor: pointer; color: inherit; opacity: 0.6; font-size: 1.1rem; }
    .alert-close:hover { opacity: 1; }

    /* PAGE HEADER */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-header-left { display: flex; align-items: center; gap: 1rem; }
    .page-icon { width: 54px; height: 54px; border-radius: 14px; background: linear-gradient(135deg, rgba(14,165,233,0.3), rgba(14,165,233,0.1)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .page-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
    .page-sub { color: var(--muted); font-size: 0.9rem; margin: 0; }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 1.5rem; }
    .search-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .search-input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 0.75rem 1rem 0.75rem 2.75rem;
      border-radius: 12px; font-size: 0.92rem; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--primary); background: rgba(108,99,255,0.05); box-shadow: 0 0 0 4px rgba(108,99,255,0.1); color: var(--text); }
    .search-input::placeholder { color: rgba(167,165,190,0.5); }

    /* TABLE CARD */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .table-header {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-header h5 { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0; }
    .student-count { background: rgba(108,99,255,0.15); color: #a78bfa; border-radius: 50px; padding: 0.2rem 0.75rem; font-size: 0.78rem; font-weight: 700; }

    .students-table { width: 100%; }
    .students-table th { padding: 0.75rem 1.5rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .students-table td { padding: 1rem 1.5rem; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .students-table tr:last-child td { border-bottom: none; }
    .students-table tr:hover td { background: rgba(108,99,255,0.04); }

    /* STUDENT CELL */
    .student-cell { display: flex; align-items: center; gap: 0.85rem; }
    .student-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(108,99,255,0.3); flex-shrink: 0; }
    .student-placeholder { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; flex-shrink: 0; }
    .student-name { font-weight: 600; font-size: 0.92rem; }
    .student-id { color: var(--muted); font-size: 0.75rem; }

    .email-badge { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); font-size: 0.85rem; }
    .email-badge i { color: var(--primary); opacity: 0.6; }
    .mobile-badge { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); font-size: 0.85rem; }
    .mobile-badge i { color: var(--success); opacity: 0.7; }

    .btn-act { padding: 0.35rem 0.85rem; border-radius: 8px; font-size: 0.78rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem; margin-right: 0.4rem; }
    .ba-yellow { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .ba-yellow:hover { background: rgba(245,158,11,0.28); color: #fcd34d; }
    .ba-red { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .ba-red:hover { background: rgba(239,68,68,0.28); color: #fca5a5; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 0.75rem; opacity: 0.3; }

    /* MODAL */
    .modal-dark .modal-content { background: #1a1829; border: 1px solid rgba(108,99,255,0.2); border-radius: 18px; color: var(--text); }
    .modal-dark .modal-header { border-bottom: 1px solid rgba(255,255,255,0.07); padding: 1.5rem; }
    .modal-dark .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; }
    .modal-dark .btn-close { filter: invert(1); opacity: 0.5; }
    .modal-dark .btn-close:hover { opacity: 1; }
    .modal-dark .modal-body { padding: 1.5rem; }
    .modal-dark .modal-footer { border-top: 1px solid rgba(255,255,255,0.07); padding: 1rem 1.5rem; }
    .modal-student-info { background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.15); border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; font-size: 0.9rem; color: var(--muted); }
    .modal-student-info strong { color: var(--text); }
    .form-label-dark { font-size: 0.82rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; display: block; }
    .form-control-dark { background: #0f0e17; border: 1.5px solid rgba(255,255,255,0.08); color: var(--text); padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; width: 100%; transition: all 0.2s; }
    .form-control-dark:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(108,99,255,0.1); color: var(--text); background: #0f0e17; }
    .btn-modal-cancel { background: rgba(255,255,255,0.06); color: var(--muted); border: none; border-radius: 10px; padding: 0.65rem 1.3rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-modal-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-modal-reset { background: var(--accent); color: #0f0e17; border: none; border-radius: 10px; padding: 0.65rem 1.3rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif; }
    .btn-modal-reset:hover { background: #e08d00; transform: translateY(-1px); }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container main">

  <!-- ALERTS -->
  <div th:if="${errorMessage}" class="alert-error-dark">
    <span><i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span></span>
    <button class="alert-close" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
  </div>
  <div th:if="${successMessage}" class="alert-success-dark">
    <span><i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span></span>
    <button class="alert-close" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
  </div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-icon">👥</div>
      <div>
        <h1 class="page-title">Student Accounts</h1>
        <p class="page-sub">Manage all registered students, reset passwords</p>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <i class="bi bi-search"></i>
    <input type="text" class="search-input" id="studentSearch" placeholder="Search by name, email or mobile..." oninput="filterStudents()">
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <h5><i class="bi bi-people-fill me-2" style="color:#0ea5e9;"></i>All Students</h5>
      <span class="student-count" id="studentCountBadge" th:text="${#lists.size(students)} + ' students'">0 students</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="students-table" id="studentsTable">
        <thead>
        <tr>
          <th>Student</th>
          <th>Email</th>
          <th>Mobile</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>

        <!-- EMPTY STATE -->
        <tr th:if="${#lists.isEmpty(students)}">
          <td colspan="4">
            <div class="empty-state">
              <i class="bi bi-person-x-fill"></i>
              No student accounts registered yet.
            </div>
          </td>
        </tr>

        <!-- STUDENT ROWS -->
        <tr th:each="student : ${students}" class="student-row"
            th:attr="data-name=${student.fullName}, data-email=${student.username}, data-mobile=${student.mobileNumber}">

          <td>
            <div class="student-cell">
              <img th:if="${student.profilePicUrl != null}"
                   th:src="@{${student.profilePicUrl}}" alt="Pic" class="student-pic">
              <div th:if="${student.profilePicUrl == null}" class="student-placeholder">
                <i class="bi bi-person-fill"></i>
              </div>
              <div>
                <div class="student-name" th:text="${student.fullName}">Full Name</div>
                <div class="student-id">ID: #<span th:text="${student.id}">1</span></div>
              </div>
            </div>
          </td>

          <td>
            <div class="email-badge">
              <i class="bi bi-envelope-fill"></i>
              <span th:text="${student.username}">email@example.com</span>
            </div>
          </td>

          <td>
            <div class="mobile-badge" th:if="${student.mobileNumber != null}">
              <i class="bi bi-phone-fill"></i>
              <span th:text="${student.mobileNumber}">+91XXXXXXXXXX</span>
            </div>
            <span th:if="${student.mobileNumber == null}" style="color:var(--muted);font-size:0.82rem;">Not provided</span>
          </td>

          <td>
            <button type="button" class="btn-act ba-yellow"
                    data-bs-toggle="modal" data-bs-target="#resetPasswordModal"
                    th:attr="data-student-id=${student.id}, data-student-name=${student.username}">
              <i class="bi bi-key-fill"></i> Reset Password
            </button>
            <a th:href="@{/admin/student/delete/{id}(id=${student.id})}" class="btn-act ba-red"
               onclick="return confirm('Delete this student? This will also permanently delete ALL their exam results and answers.')">
              <i class="bi bi-trash-fill"></i> Delete
            </a>
          </td>
        </tr>

        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- RESET PASSWORD MODAL -->
<div class="modal fade modal-dark" id="resetPasswordModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-key-fill me-2" style="color:var(--accent);"></i>Reset Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/student/reset-password}" method="post">
        <div class="modal-body">
          <div class="modal-student-info">
            Resetting password for: <strong id="studentNameLabel">—</strong>
          </div>
          <input type="hidden" id="modalStudentId" name="userId" value="">
          <div>
            <label class="form-label-dark">New Password</label>
            <input type="password" class="form-control-dark" id="newPassword" name="newPassword" placeholder="Enter new password" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-modal-reset"><i class="bi bi-check-lg me-1"></i> Reset Password</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Modal: fill student info
  document.getElementById('resetPasswordModal').addEventListener('show.bs.modal', function(e) {
    const btn = e.relatedTarget;
    document.getElementById('modalStudentId').value = btn.getAttribute('data-student-id');
    document.getElementById('studentNameLabel').textContent = btn.getAttribute('data-student-name');
  });

  // Live search filter
  function filterStudents() {
    const q = document.getElementById('studentSearch').value.toLowerCase();
    const rows = document.querySelectorAll('.student-row');
    let visible = 0;
    rows.forEach(row => {
      const name  = (row.getAttribute('data-name') || '').toLowerCase();
      const email = (row.getAttribute('data-email') || '').toLowerCase();
      const mob   = (row.getAttribute('data-mobile') || '').toLowerCase();
      const show  = name.includes(q) || email.includes(q) || mob.includes(q);
      row.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    document.getElementById('studentCountBadge').textContent = visible + ' students';
  }
</script>
</body>
</html>
