<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Exam — EduExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#6c63ff;--primary-dark:#4f46e5;--dark:#0f0e17;--surface:#1a1829;--card:#221f35;--text:#fffffe;--muted:#a7a5be;--border:rgba(108,99,255,0.12);}
        *{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
        h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;}
        .main{padding:2rem 0 4rem;}

        .page-wrap{max-width:600px;margin:0 auto;}

        /* BREADCRUMB */
        .breadcrumb-dark{display:flex;align-items:center;gap:0.5rem;margin-bottom:2rem;font-size:0.85rem;color:var(--muted);}
        .breadcrumb-dark a{color:var(--muted);text-decoration:none;}
        .breadcrumb-dark a:hover{color:var(--text);}
        .breadcrumb-dark i{font-size:0.7rem;opacity:0.5;}

        /* FORM CARD */
        .form-card{background:var(--card);border:1px solid var(--border);border-radius:22px;overflow:hidden;}
        .form-card-header{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;}
        .form-card-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(108,99,255,0.3),rgba(108,99,255,0.1));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
        .form-card-header h2{font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;margin:0;}
        .form-card-header p{color:var(--muted);font-size:0.88rem;margin:0.2rem 0 0;}
        .form-card-body{padding:2rem;}

        /* INPUTS */
        .field-group{margin-bottom:1.5rem;}
        .field-label{font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:0.5rem;}
        .field-input{width:100%;background:var(--surface);border:1.5px solid rgba(255,255,255,0.07);color:var(--text);padding:0.85rem 1rem;border-radius:12px;font-size:0.95rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
        .field-input:focus{outline:none;border-color:var(--primary);background:rgba(108,99,255,0.05);box-shadow:0 0 0 4px rgba(108,99,255,0.1);color:var(--text);}
        .field-input::placeholder{color:rgba(167,165,190,0.5);}
        .field-hint{font-size:0.78rem;color:var(--muted);margin-top:0.4rem;}

        /* PREVIEW BOX */
        .preview-box{background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.15);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;}
        .preview-item{text-align:center;flex:1;}
        .preview-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--primary);}
        .preview-lbl{font-size:0.75rem;color:var(--muted);}

        /* BUTTONS */
        .form-actions{display:flex;gap:0.75rem;margin-top:0.5rem;}
        .btn-submit{flex:1;background:var(--primary);color:white;border:none;border-radius:12px;padding:0.9rem;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 6px 20px rgba(108,99,255,0.3);}
        .btn-submit:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 10px 25px rgba(108,99,255,0.4);}
        .btn-cancel{background:rgba(255,255,255,0.06);color:var(--muted);border:none;border-radius:12px;padding:0.9rem 1.5rem;font-size:0.95rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;justify-content:center;}
        .btn-cancel:hover{background:rgba(255,255,255,0.1);color:var(--text);}
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container main">
    <div class="page-wrap">

        <!-- BREADCRUMB -->
        <div class="breadcrumb-dark">
            <a th:href="@{/admin/dashboard}"><i class="bi bi-house-fill"></i> Dashboard</a>
            <i class="bi bi-chevron-right"></i>
            <a th:href="@{/admin/manage-exams}">Manage Exams</a>
            <i class="bi bi-chevron-right"></i>
            <span style="color:var(--text);">Create New</span>
        </div>

        <!-- FORM CARD -->
        <div class="form-card">
            <div class="form-card-header">
                <div class="form-card-icon">📋</div>
                <div>
                    <h2>Create New Exam</h2>
                    <p>Fill in the details below to create a new exam</p>
                </div>
            </div>
            <div class="form-card-body">

                <!-- LIVE PREVIEW -->
                <div class="preview-box" id="previewBox">
                    <div class="preview-item">
                        <div class="preview-val" id="prevTitle">—</div>
                        <div class="preview-lbl">Exam Title</div>
                    </div>
                    <div class="preview-item">
                        <div class="preview-val" id="prevDur">0</div>
                        <div class="preview-lbl">Minutes</div>
                    </div>
                </div>

                <form th:action="@{/admin/exam/add}" th:object="${exam}" method="post">
                    <div class="field-group">
                        <label class="field-label">Exam Title</label>
                        <input type="text" class="field-input" th:field="*{title}" placeholder="e.g. Java Programming Basics" required oninput="document.getElementById('prevTitle').textContent=this.value||'—'">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Duration (minutes)</label>
                        <input type="number" class="field-input" th:field="*{durationInMinutes}" placeholder="e.g. 60" required min="1" oninput="document.getElementById('prevDur').textContent=this.value||'0'">
                        <div class="field-hint"><i class="bi bi-info-circle me-1"></i>Students will have exactly this many minutes to complete the exam.</div>
                    </div>
                    <div class="form-actions">
                        <a th:href="@{/admin/manage-exams}" class="btn-cancel"><i class="bi bi-x me-1"></i> Cancel</a>
                        <button type="submit" class="btn-submit"><i class="bi bi-plus-circle-fill"></i> Create Exam</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
