<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg edu-navbar">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    .edu-navbar {
      background: rgba(15,14,23,0.95) !important;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(108,99,255,0.12);
      padding: 0.75rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .edu-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      font-size: 1.35rem !important;
      color: #fffffe !important;
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .edu-brand span { color: #6c63ff; }

    .edu-navbar .nav-link {
      color: #a7a5be !important;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.92rem;
      padding: 0.4rem 0.75rem !important;
      border-radius: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .edu-navbar .nav-link:hover {
      color: #fffffe !important;
      background: rgba(255,255,255,0.06);
    }

    /* Admin badge link */
    .edu-navbar .admin-link {
      color: #f59e0b !important;
      background: rgba(245,158,11,0.08) !important;
      border: 1px solid rgba(245,158,11,0.2) !important;
      border-radius: 50px !important;
      padding: 0.35rem 0.9rem !important;
      font-weight: 600 !important;
    }
    .edu-navbar .admin-link:hover {
      background: rgba(245,158,11,0.18) !important;
      color: #f59e0b !important;
    }

    /* Auth buttons */
    .btn-signin {
      color: #a7a5be !important;
      border: 1.5px solid rgba(255,255,255,0.12) !important;
      border-radius: 50px !important;
      padding: 0.38rem 1.1rem !important;
      font-size: 0.88rem !important;
      font-weight: 500 !important;
      transition: all 0.2s !important;
    }
    .btn-signin:hover {
      color: #fffffe !important;
      border-color: rgba(255,255,255,0.3) !important;
      background: rgba(255,255,255,0.05) !important;
    }
    .btn-getstarted {
      background: #6c63ff !important;
      color: white !important;
      border-radius: 50px !important;
      padding: 0.38rem 1.1rem !important;
      font-size: 0.88rem !important;
      font-weight: 600 !important;
      border: none !important;
      transition: all 0.2s !important;
    }
    .btn-getstarted:hover {
      background: #4f46e5 !important;
      color: white !important;
      transform: translateY(-1px);
    }

    /* Profile avatar */
    .nav-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(108,99,255,0.5);
    }
    .nav-avatar-placeholder {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: white;
      border: 2px solid rgba(108,99,255,0.5);
      flex-shrink: 0;
    }
    .edu-navbar .dropdown-menu {
      background: #1a1829 !important;
      border: 1px solid rgba(108,99,255,0.18) !important;
      border-radius: 14px !important;
      padding: 0.4rem !important;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6) !important;
      min-width: 180px;
      margin-top: 0.5rem !important;
    }
    .edu-navbar .dropdown-item {
      color: #a7a5be !important;
      border-radius: 8px !important;
      font-size: 0.88rem !important;
      padding: 0.5rem 0.8rem !important;
      transition: all 0.15s !important;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .edu-navbar .dropdown-item:hover {
      background: rgba(108,99,255,0.12) !important;
      color: #fffffe !important;
    }
    .edu-navbar .dropdown-item.logout-item { color: #fca5a5 !important; }
    .edu-navbar .dropdown-item.logout-item:hover { background: rgba(239,68,68,0.1) !important; }
    .edu-navbar .dropdown-divider { border-color: rgba(255,255,255,0.07) !important; margin: 0.3rem 0 !important; }
    .user-name-label {
      font-size: 0.78rem; color: #6c63ff; font-weight: 600;
      padding: 0.3rem 0.8rem 0.1rem;
      display: block;
    }
    #logoutForm { display: none; }

    /* Mobile fixes */
    .navbar-toggler {
      border: 1px solid rgba(255,255,255,0.15) !important;
      padding: 0.3rem 0.5rem !important;
    }
    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.6%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
    }
    @media (max-width: 991px) {
      .edu-navbar .navbar-collapse {
        background: #13112b;
        border-radius: 14px;
        padding: 1rem;
        margin-top: 0.5rem;
        border: 1px solid rgba(108,99,255,0.15);
      }
      .edu-navbar .navbar-nav { gap: 0.2rem; }
      .edu-navbar .d-flex { flex-direction: column; gap: 0.5rem !important; align-items: stretch !important; }
      .btn-signin, .btn-getstarted { text-align: center; display: block !important; }
    }
  </style>

  <div class="container">
    <a class="edu-brand" th:href="@{/}">Edu<span>Exam</span></a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#eduNavMain"
            aria-controls="eduNavMain" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="eduNavMain">

      <!-- LEFT NAV LINKS -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">

        <!-- ADMIN links -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/dashboard}">
            <i class="bi bi-grid-fill"></i> Dashboard
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/manage-exams}">
            <i class="bi bi-journal-text"></i> Manage Exams
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/students}">
            <i class="bi bi-people-fill"></i> Students
          </a>
        </li>

        <!-- STUDENT links -->
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" th:href="@{/student/dashboard}">
            <i class="bi bi-house-fill"></i> Dashboard
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" th:href="@{/student/my-results}">
            <i class="bi bi-bar-chart-fill"></i> My Results
          </a>
        </li>
      </ul>

      <!-- RIGHT NAV -->
      <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

        <!-- NOT logged in -->
        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link btn-signin" th:href="@{/login}">Sign In</a>
        </li>
        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link btn-getstarted" th:href="@{/register}">Get Started</a>
        </li>

        <!-- ADMIN Panel badge -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link admin-link" th:href="@{/admin/dashboard}">
            <i class="bi bi-shield-lock-fill"></i> Admin Panel
          </a>
        </li>

        <!-- PROFILE dropdown (logged in) -->
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
             href="#" id="profileDrop" role="button"
             data-bs-toggle="dropdown" aria-expanded="false">

            <img th:if="${globalProfilePicUrl != null}"
                 th:src="@{${globalProfilePicUrl}}"
                 alt="Profile" class="nav-avatar">
            <span th:if="${globalProfilePicUrl == null}" class="nav-avatar-placeholder">
              <i class="bi bi-person-fill"></i>
            </span>
            <span style="color:#fffffe; font-size:0.9rem;" sec:authentication="name"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <span class="user-name-label" sec:authentication="name"></span>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li sec:authorize="hasRole('STUDENT')">
              <a class="dropdown-item" th:href="@{/student/profile}">
                <i class="bi bi-person-fill"></i> My Profile
              </a>
            </li>
            <li sec:authorize="hasRole('STUDENT')">
              <a class="dropdown-item" th:href="@{/student/my-results}">
                <i class="bi bi-trophy-fill"></i> My Results
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item logout-item"
                 href="javascript:document.getElementById('logoutForm').submit();">
                <i class="bi bi-box-arrow-right"></i> Logout
              </a>
              <form th:action="@{/logout}" method="post" id="logoutForm"></form>
            </li>
          </ul>
        </li>

      </ul>
    </div>
  </div>
</nav>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
