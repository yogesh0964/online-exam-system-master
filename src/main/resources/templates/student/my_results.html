<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My Results — EduExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#6c63ff;--primary-dark:#4f46e5;--success:#10b981;--danger:#ef4444;--dark:#0f0e17;--surface:#1a1829;--card:#221f35;--text:#fffffe;--muted:#a7a5be;--border:rgba(108,99,255,0.12);}
        *{box-sizing:border-box;} body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;} h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;} .main{padding:2rem 0 4rem;}
        .page-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
        .page-icon{width:54px;height:54px;border-radius:14px;background:rgba(108,99,255,0.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
        .page-header h1{font-size:1.6rem;font-weight:800;margin:0;} .page-header p{color:var(--muted);margin:0.15rem 0 0;font-size:0.88rem;}
        .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
        .result-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all 0.3s;display:flex;flex-direction:column;}
        .result-card:hover{transform:translateY(-5px);border-color:rgba(108,99,255,0.3);box-shadow:0 16px 40px rgba(0,0,0,0.3);}
        .card-color-bar{height:3px;width:100%;}
        .card-body-inner{padding:1.4rem;flex:1;display:flex;flex-direction:column;}
        .result-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:0.3rem;}
        .result-date{color:var(--muted);font-size:0.78rem;display:flex;align-items:center;gap:0.3rem;margin-bottom:1.1rem;}
        .score-box{background:var(--surface);border-radius:12px;padding:1rem;text-align:center;margin-bottom:1.1rem;}
        .score-pct{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;line-height:1;margin-bottom:0.25rem;}
        .score-raw{color:var(--muted);font-size:0.82rem;}
        .pct-bar{height:5px;border-radius:50px;background:rgba(255,255,255,0.07);margin-top:0.6rem;overflow:hidden;}
        .pct-bar-fill{height:100%;border-radius:50px;}
        .btn-review{display:block;text-align:center;background:rgba(108,99,255,0.15);color:#a78bfa;border-radius:10px;padding:0.65rem;font-size:0.88rem;font-weight:700;font-family:'Syne',sans-serif;text-decoration:none;transition:all 0.2s;margin-top:auto;}
        .btn-review:hover{background:rgba(108,99,255,0.28);color:#a78bfa;}
        .empty-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:5rem 2rem;text-align:center;}
        .empty-card i{font-size:3.5rem;display:block;margin-bottom:0.75rem;opacity:0.2;}
        .empty-card h3{font-size:1.2rem;font-weight:800;margin-bottom:0.5rem;}
        .empty-card p{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;}
        .btn-find{background:var(--primary);color:white;border-radius:50px;padding:0.6rem 1.5rem;font-size:0.9rem;font-weight:700;font-family:'Syne',sans-serif;text-decoration:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem;}
        .btn-find:hover{background:var(--primary-dark);color:white;}
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container main">
    <div class="page-header">
        <div class="page-icon">📋</div>
        <div><h1>My Exam History</h1><p>Review all your past scores and attempts</p></div>
    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(pastResults)}" class="empty-card">
        <i class="bi bi-emoji-frown"></i>
        <h3>No Results Found</h3>
        <p>You haven't completed any exams yet. Start your first one!</p>
        <a th:href="@{/student/dashboard}" class="btn-find"><i class="bi bi-pencil-square"></i> Find an Exam</a>
    </div>

    <!-- RESULTS GRID -->
    <div class="results-grid" th:unless="${#lists.isEmpty(pastResults)}">
        <div th:each="result, i : ${pastResults}" class="result-card">
            <div class="card-color-bar"
                 th:style="${i.index % 3 == 0 ? 'background:linear-gradient(90deg,#6c63ff,#a78bfa)' : (i.index % 3 == 1 ? 'background:linear-gradient(90deg,#10b981,#34d399)' : 'background:linear-gradient(90deg,#f59e0b,#fbbf24)')}"></div>
            <div class="card-body-inner">
                <div class="result-title" th:text="${result.exam.title}">Exam</div>
                <div class="result-date"><i class="bi bi-calendar-check-fill"></i><span th:text="${#temporals.format(result.submissionTime,'MMM dd, yyyy')}">Date</span></div>
                <div class="score-box" th:if="${result.totalMarks > 0}" th:with="p=${result.scoreAchieved * 100.0 / result.totalMarks}">
                    <div class="score-pct" th:style="${p >= 70 ? 'color:#10b981' : 'color:#ef4444'}" th:text="${#numbers.formatDecimal(p,1,1) + '%'}">0%</div>
                    <div class="score-raw" th:text="'Score: ' + ${result.scoreAchieved} + ' / ' + ${result.totalMarks}">0/0</div>
                    <div class="pct-bar"><div class="pct-bar-fill" th:style="${'width:' + #numbers.formatDecimal(p,1,1) + '%;background:' + (p >= 70 ? '#10b981' : '#ef4444')}"></div></div>
                </div>
                <div class="score-box" th:if="${result.totalMarks == 0}"><div class="score-pct" style="color:var(--muted);">N/A</div></div>
                <a th:href="@{/student/review/{id}(id=${result.id})}" class="btn-review"><i class="bi bi-search me-1"></i> Review Answers</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
