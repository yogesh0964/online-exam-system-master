<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${exam.title} + ' — EduExam'">Exam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#6c63ff;--primary-dark:#4f46e5;--success:#10b981;--danger:#ef4444;--dark:#0f0e17;--surface:#1a1829;--card:#221f35;--text:#fffffe;--muted:#a7a5be;--border:rgba(108,99,255,0.12);}
        *{box-sizing:border-box;} body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;} h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;}

        /* EXAM HEADER */
        .exam-header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 0;margin-bottom:1.5rem;}
        .exam-header-inner{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
        .student-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(108,99,255,0.3);object-fit:cover;flex-shrink:0;}
        .student-placeholder{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:white;flex-shrink:0;}
        .student-info h5{font-size:1rem;font-weight:800;margin:0 0 0.1rem;} .student-info p{color:var(--muted);font-size:0.78rem;margin:0;}
        .exam-chips{display:flex;gap:0.5rem;flex-wrap:wrap;margin-left:auto;}
        .exam-chip{background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.18);color:#a78bfa;border-radius:50px;padding:0.3rem 0.85rem;font-size:0.78rem;font-weight:600;display:inline-flex;align-items:center;gap:0.35rem;}

        /* MAIN LAYOUT */
        .exam-layout{display:grid;grid-template-columns:1fr 260px;gap:1.25rem;align-items:start;}
        @media(max-width:860px){.exam-layout{grid-template-columns:1fr;}}

        /* QUESTION CARD */
        .question-card{display:none;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:0;}
        .question-card.active{display:block;}
        .q-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;}
        .q-num-badge{background:rgba(108,99,255,0.15);color:#a78bfa;border-radius:8px;padding:0.25rem 0.75rem;font-size:0.8rem;font-weight:700;font-family:'Syne',sans-serif;}
        .q-marks-badge{background:rgba(245,158,11,0.12);color:#fcd34d;border-radius:50px;padding:0.2rem 0.65rem;font-size:0.75rem;font-weight:700;margin-left:auto;}
        .q-body{padding:1.5rem;}
        .q-text{font-size:1.05rem;font-weight:500;line-height:1.6;margin-bottom:1.5rem;}

        /* OPTIONS */
        .option-wrap{display:flex;flex-direction:column;gap:0.6rem;}
        .option-label{display:flex;align-items:center;gap:0.9rem;background:var(--surface);border:1.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:0.85rem 1.1rem;cursor:pointer;transition:all 0.2s;position:relative;}
        .option-label:hover{border-color:rgba(108,99,255,0.35);background:rgba(108,99,255,0.06);}
        .option-label input[type="radio"]{position:absolute;opacity:0;width:0;}
        .option-label.selected{border-color:var(--primary);background:rgba(108,99,255,0.12);}
        .opt-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.72rem;font-weight:800;color:var(--muted);transition:all 0.2s;}
        .option-label.selected .opt-dot{border-color:var(--primary);background:var(--primary);color:white;}
        .opt-text{font-size:0.92rem;font-weight:500;}

        /* NAV BTNS */
        .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}
        .btn-nav{display:inline-flex;align-items:center;gap:0.4rem;border:none;border-radius:50px;padding:0.6rem 1.3rem;font-size:0.88rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;}
        .btn-prev{background:rgba(255,255,255,0.07);color:var(--muted);} .btn-prev:hover{background:rgba(255,255,255,0.12);color:var(--text);}
        .btn-next{background:var(--primary);color:white;box-shadow:0 4px 15px rgba(108,99,255,0.3);} .btn-next:hover{background:var(--primary-dark);}
        .btn-nav:disabled{opacity:0.35;cursor:not-allowed;transform:none !important;}

        /* SIDEBAR */
        .sidebar{position:sticky;top:80px;}
        .timer-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:1rem;}
        .timer-top{padding:1.25rem;text-align:center;border-bottom:1px solid var(--border);}
        .timer-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:0.35rem;}
        #timer{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:#ef4444;letter-spacing:2px;line-height:1;}
        .timer-card.warning #timer{animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

        .palette-section{padding:1.1rem;}
        .palette-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:0.75rem;}
        .palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:6px;}
        .q-palette-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--muted);font-size:0.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;font-family:'Syne',sans-serif;}
        .q-palette-btn:hover{border-color:rgba(108,99,255,0.4);color:var(--primary);}
        .q-palette-btn.active{background:rgba(108,99,255,0.2);border-color:var(--primary);color:#a78bfa;}
        .q-palette-btn.answered{background:rgba(16,185,129,0.15);border-color:#10b981;color:#6ee7b7;}
        .q-palette-btn.active.answered{background:rgba(16,185,129,0.25);border-color:#10b981;}

        .btn-submit{width:calc(100% - 2.2rem);margin:0 1.1rem 1.1rem;background:var(--success);color:white;border:none;border-radius:12px;padding:0.9rem;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 4px 15px rgba(16,185,129,0.25);}
        .btn-submit:hover{background:#059669;transform:translateY(-1px);}

        /* LEGEND */
        .legend{display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:0.75rem;}
        .legend-item{display:flex;align-items:center;gap:0.35rem;font-size:0.72rem;color:var(--muted);}
        .legend-dot{width:10px;height:10px;border-radius:3px;}
    </style>
</head>
<body>

<!-- EXAM HEADER -->
<div class="exam-header">
    <div class="container exam-header-inner">
        <img th:if="${student.profilePicUrl != null}" th:src="@{${student.profilePicUrl}}" alt="pic" class="student-avatar">
        <div th:if="${student.profilePicUrl == null}" class="student-placeholder"><i class="bi bi-person-fill"></i></div>
        <div class="student-info">
            <h5 th:text="${student.fullName}">Student</h5>
            <p th:text="${student.username}">email</p>
        </div>
        <div class="exam-chips">
            <span class="exam-chip"><i class="bi bi-journal-text"></i> <span th:text="${exam.title}">Exam</span></span>
            <span class="exam-chip"><i class="bi bi-clock"></i> <span th:text="${exam.durationInMinutes} + ' min'">60 min</span></span>
            <span class="exam-chip"><i class="bi bi-question-circle"></i> <span th:text="${#lists.size(questions)} + ' Qs'">0 Qs</span></span>
        </div>
    </div>
</div>

<div class="container pb-5">
    <form id="exam-form" th:action="@{/exam/submit}" method="post">
        <input type="hidden" name="examId" th:value="${exam.id}"/>
        <div class="exam-layout">

            <!-- LEFT: QUESTIONS -->
            <div>
                <div th:each="question, iter : ${questions}"
                     class="question-card"
                     th:id="|q-card-${iter.index}|"
                     th:data-question-index="${iter.index}">
                    <div class="q-header">
                        <span class="q-num-badge" th:text="'Q ' + ${iter.count}">Q 1</span>
                        <span class="q-marks-badge"><i class="bi bi-star-fill me-1"></i><span th:text="${question.marks}">1</span> mark</span>
                    </div>
                    <div class="q-body">
                        <p class="q-text" th:text="${question.text}">Question text</p>
                        <div class="option-wrap">
                            <label class="option-wrap-item" th:each="optNum : ${#numbers.sequence(1,4)}">
                            </label>
                            <!-- Option 1 -->
                            <label class="option-label" th:for="|q${question.id}_opt1|">
                                <input type="radio" th:name="|q_${question.id}|" th:id="|q${question.id}_opt1|" value="1" required>
                                <div class="opt-dot">A</div>
                                <span class="opt-text" th:text="${question.option1}">Option 1</span>
                            </label>
                            <!-- Option 2 -->
                            <label class="option-label" th:for="|q${question.id}_opt2|">
                                <input type="radio" th:name="|q_${question.id}|" th:id="|q${question.id}_opt2|" value="2">
                                <div class="opt-dot">B</div>
                                <span class="opt-text" th:text="${question.option2}">Option 2</span>
                            </label>
                            <!-- Option 3 -->
                            <label class="option-label" th:for="|q${question.id}_opt3|">
                                <input type="radio" th:name="|q_${question.id}|" th:id="|q${question.id}_opt3|" value="3">
                                <div class="opt-dot">C</div>
                                <span class="opt-text" th:text="${question.option3}">Option 3</span>
                            </label>
                            <!-- Option 4 -->
                            <label class="option-label" th:for="|q${question.id}_opt4|">
                                <input type="radio" th:name="|q_${question.id}|" th:id="|q${question.id}_opt4|" value="4">
                                <div class="opt-dot">D</div>
                                <span class="opt-text" th:text="${question.option4}">Option 4</span>
                            </label>
                        </div>
                    </div>
                </div>
                <!-- NAV BUTTONS -->
                <div class="nav-row">
                    <button type="button" id="prev-btn" class="btn-nav btn-prev"><i class="bi bi-arrow-left"></i> Previous</button>
                    <button type="button" id="next-btn" class="btn-nav btn-next">Next <i class="bi bi-arrow-right"></i></button>
                </div>
            </div>

            <!-- RIGHT: SIDEBAR -->
            <div class="sidebar">
                <div class="timer-card" id="timerCard">
                    <div class="timer-top">
                        <div class="timer-label"><i class="bi bi-hourglass-split me-1"></i>Time Remaining</div>
                        <div id="timer">--:--</div>
                    </div>
                    <div class="palette-section">
                        <div class="palette-label">Question Navigator</div>
                        <div class="palette-grid">
                            <button type="button" th:each="q, iter : ${questions}" class="q-palette-btn"
                                    th:text="${iter.count}" th:data-question-index="${iter.index}"></button>
                        </div>
                        <div class="legend">
                            <div class="legend-item"><div class="legend-dot" style="background:rgba(108,99,255,0.3);border:1px solid var(--primary);"></div> Current</div>
                            <div class="legend-item"><div class="legend-dot" style="background:rgba(16,185,129,0.25);border:1px solid #10b981;"></div> Answered</div>
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-submit">
                        <i class="bi bi-check-circle-fill"></i> Submit Exam
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<script th:src="@{/js/exam-timer.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const durationInMinutes = [[${exam.durationInMinutes}]];
        const timerDisplay = document.getElementById('timer');
        const timerCard    = document.getElementById('timerCard');
        const examForm     = document.getElementById('exam-form');
        startTimer(durationInMinutes, timerDisplay, examForm);

        // Warn when <5 min left
        const origStart = window.startTimer;

        const questions    = document.querySelectorAll('.question-card');
        const paletteBtns  = document.querySelectorAll('.q-palette-btn');
        const prevBtn      = document.getElementById('prev-btn');
        const nextBtn      = document.getElementById('next-btn');
        let currentIndex   = 0;
        const total        = questions.length;

        function showQuestion(index) {
            if (index < 0 || index >= total) return;
            questions.forEach(q => q.classList.remove('active'));
            document.getElementById('q-card-' + index)?.classList.add('active');
            paletteBtns.forEach(b => b.classList.remove('active'));
            document.querySelector(`.q-palette-btn[data-question-index="${index}"]`)?.classList.add('active');
            currentIndex = index;
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === total - 1);
        }

        nextBtn.addEventListener('click', () => showQuestion(currentIndex + 1));
        prevBtn.addEventListener('click', () => showQuestion(currentIndex - 1));
        paletteBtns.forEach(btn => btn.addEventListener('click', () => showQuestion(parseInt(btn.getAttribute('data-question-index')))));

        // Highlight selected option visually
        document.querySelectorAll('.option-label').forEach(label => {
            label.addEventListener('click', function () {
                const radio = this.querySelector('input[type="radio"]');
                const name  = radio.name;
                document.querySelectorAll(`input[name="${name}"]`).forEach(r => r.closest('.option-label').classList.remove('selected'));
                this.classList.add('selected');
                // Mark palette
                const card  = this.closest('.question-card');
                const idx   = card.getAttribute('data-question-index');
                document.querySelector(`.q-palette-btn[data-question-index="${idx}"]`)?.classList.add('answered');
            });
        });

        showQuestion(0);
    });
</script>
</body>
</html>
