<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Profile — EduExam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#6c63ff;--primary-dark:#4f46e5;--accent:#f59e0b;--dark:#0f0e17;--surface:#1a1829;--card:#221f35;--text:#fffffe;--muted:#a7a5be;--border:rgba(108,99,255,0.12);}
    *{box-sizing:border-box;} body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;} h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;} .main{padding:2rem 0 4rem;}
    .alert-success-dark{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;border-radius:12px;padding:0.85rem 1.2rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;}
    .alert-error-dark{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;border-radius:12px;padding:0.85rem 1.2rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;}
    .alert-close{background:none;border:none;cursor:pointer;color:inherit;opacity:0.6;font-size:1.1rem;} .alert-close:hover{opacity:1;}
    .profile-layout{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;align-items:start;} @media(max-width:860px){.profile-layout{grid-template-columns:1fr;}}
    /* PROFILE PIC CARD */
    .pic-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
    .pic-card-top{padding:2rem;text-align:center;border-bottom:1px solid var(--border);}
    .profile-pic{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid rgba(108,99,255,0.4);box-shadow:0 0 0 6px rgba(108,99,255,0.1);}
    .profile-placeholder{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:2.8rem;color:white;margin:0 auto;box-shadow:0 0 0 6px rgba(108,99,255,0.1);}
    .profile-name{font-size:1.15rem;font-weight:800;margin:0.85rem 0 0.2rem;}
    .profile-email{color:var(--muted);font-size:0.84rem;}
    .pic-card-body{padding:1.25rem;}
    /* FORM SECTIONS */
    .form-section{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:1.25rem;}
    .form-section:last-child{margin-bottom:0;}
    .form-section-header{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;}
    .form-section-header h5{font-size:1rem;font-weight:800;margin:0;}
    .section-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;}
    .form-section-body{padding:1.5rem;}
    /* INPUTS */
    .field-group{margin-bottom:1.2rem;}
    .field-label{font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:0.45rem;}
    .field-input{width:100%;background:var(--surface);border:1.5px solid rgba(255,255,255,0.07);color:var(--text);padding:0.8rem 1rem;border-radius:11px;font-size:0.92rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .field-input:focus{outline:none;border-color:var(--primary);background:rgba(108,99,255,0.05);box-shadow:0 0 0 4px rgba(108,99,255,0.1);color:var(--text);}
    .field-input:disabled{opacity:0.5;cursor:not-allowed;}
    .field-input::placeholder{color:rgba(167,165,190,0.5);}
    .field-hint{font-size:0.76rem;color:var(--muted);margin-top:0.35rem;}
    .btn-save{background:var(--primary);color:white;border:none;border-radius:10px;padding:0.75rem 1.5rem;font-size:0.92rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem;box-shadow:0 4px 15px rgba(108,99,255,0.25);}
    .btn-save:hover{background:var(--primary-dark);transform:translateY(-1px);}
    .btn-password{background:var(--accent);color:#0f0e17;border:none;border-radius:10px;padding:0.75rem 1.5rem;font-size:0.92rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem;box-shadow:0 4px 15px rgba(245,158,11,0.2);}
    .btn-password:hover{background:#e08d00;transform:translateY(-1px);}
    /* FILE INPUT */
    .file-drop{background:var(--surface);border:1.5px dashed rgba(108,99,255,0.25);border-radius:11px;padding:1.25rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
    .file-drop:hover{border-color:var(--primary);background:rgba(108,99,255,0.04);}
    .file-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .file-drop i{font-size:1.5rem;color:var(--primary);opacity:0.5;display:block;margin-bottom:0.4rem;}
    .file-drop span{color:var(--muted);font-size:0.82rem;}
    .btn-upload{width:100%;background:rgba(108,99,255,0.15);color:#a78bfa;border:none;border-radius:10px;padding:0.72rem;font-size:0.9rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;margin-top:0.85rem;}
    .btn-upload:hover{background:rgba(108,99,255,0.28);}
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container main">

  <!-- ALERTS -->
  <div th:if="${successMessage}" class="alert-success-dark">
    <span><i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span></span>
    <button class="alert-close" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
  </div>
  <div th:if="${errorMessage}" class="alert-error-dark">
    <span><i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span></span>
    <button class="alert-close" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
  </div>

  <div class="profile-layout">

    <!-- LEFT: PROFILE PIC -->
    <div>
      <div class="pic-card">
        <div class="pic-card-top">
          <img th:if="${student.profilePicUrl != null}" th:src="@{${student.profilePicUrl}}" alt="Profile" class="profile-pic">
          <div th:if="${student.profilePicUrl == null}" class="profile-placeholder"><i class="bi bi-person-fill"></i></div>
          <div class="profile-name" th:text="${student.fullName}">Name</div>
          <div class="profile-email" th:text="${student.username}">email</div>
        </div>
        <div class="pic-card-body">
          <form th:action="@{/student/profile/update-picture}" method="post" enctype="multipart/form-data">
            <div class="file-drop" id="dropZone">
              <input type="file" name="profilePicFile" accept="image/png,image/jpeg" required id="picFile" onchange="updateDropLabel(this)">
              <i class="bi bi-cloud-arrow-up-fill"></i>
              <span id="dropLabel">Click to upload photo<br><small>PNG or JPG</small></span>
            </div>
            <button type="submit" class="btn-upload"><i class="bi bi-upload me-1"></i> Upload New Picture</button>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT: FORMS -->
    <div>
      <!-- EDIT DETAILS -->
      <div class="form-section">
        <div class="form-section-header">
          <div class="section-icon" style="background:rgba(108,99,255,0.15);color:#a78bfa;"><i class="bi bi-person-fill"></i></div>
          <h5>Edit Profile Details</h5>
        </div>
        <div class="form-section-body">
          <form th:action="@{/student/profile/update-details}" th:object="${student}" method="post">
            <div class="field-group">
              <label class="field-label">Full Name</label>
              <input type="text" class="field-input" th:field="*{fullName}" placeholder="Your full name" required>
            </div>
            <div class="field-group">
              <label class="field-label">Email (Login)</label>
              <input type="email" class="field-input" th:field="*{username}" readonly disabled>
              <div class="field-hint"><i class="bi bi-lock-fill me-1"></i>Email address cannot be changed.</div>
            </div>
            <div class="field-group" style="margin-bottom:1.5rem;">
              <label class="field-label">Mobile Number</label>
              <input type="tel" class="field-input" th:field="*{mobileNumber}" placeholder="Your mobile number">
            </div>
            <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Save Changes</button>
          </form>
        </div>
      </div>

      <!-- CHANGE PASSWORD -->
      <div class="form-section">
        <div class="form-section-header">
          <div class="section-icon" style="background:rgba(245,158,11,0.15);color:#fcd34d;"><i class="bi bi-shield-lock-fill"></i></div>
          <h5>Change Password</h5>
        </div>
        <div class="form-section-body">
          <form th:action="@{/student/profile/update-password}" method="post">
            <div class="field-group">
              <label class="field-label">Current Password</label>
              <input type="password" class="field-input" name="oldPassword" placeholder="Enter current password" required>
            </div>
            <div class="field-group">
              <label class="field-label">New Password</label>
              <input type="password" class="field-input" name="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="field-group" style="margin-bottom:1.5rem;">
              <label class="field-label">Confirm New Password</label>
              <input type="password" class="field-input" name="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-password"><i class="bi bi-key-fill"></i> Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function updateDropLabel(input) {
    const label = document.getElementById('dropLabel');
    if (input.files && input.files[0]) {
      label.innerHTML = '<strong>' + input.files[0].name + '</strong><br><small>Ready to upload</small>';
    }
  }
</script>
</body>
</html>
