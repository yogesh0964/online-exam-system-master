<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account — EduExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --dark: #0f0e17;
            --surface: #1a1829;
            --card: #221f35;
            --text: #fffffe;
            --muted: #a7a5be;
            --success: #10b981;
        }
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        h1,h2,h3 { font-family: 'Syne', sans-serif; }

        .page-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
        .page-wrap::before {
            content: '';
            position: absolute;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(108,99,255,0.1), transparent 70%);
        }
        .page-wrap::after {
            content: '';
            position: absolute;
            bottom: -200px; left: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(16,185,129,0.07), transparent 70%);
        }

        .register-card {
            background: var(--card);
            border: 1px solid rgba(108,99,255,0.15);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s ease;
        }

        .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 1.5rem; display: inline-block; }
        .brand span { color: var(--primary); }

        .card-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.4rem; }
        .card-sub { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }

        .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { font-size: 0.82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; display: block; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.95rem; pointer-events: none; }
        .form-control, .form-control-file {
            background: var(--surface);
            border: 1.5px solid rgba(255,255,255,0.07);
            color: var(--text);
            padding: 0.8rem 1rem 0.8rem 2.7rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            width: 100%;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(108,99,255,0.05);
            box-shadow: 0 0 0 4px rgba(108,99,255,0.1);
            color: var(--text);
        }
        .form-control::placeholder { color: rgba(167,165,190,0.5); }
        .text-danger { color: #fca5a5 !important; font-size: 0.8rem; margin-top: 0.3rem; }

        /* File Upload */
        .upload-zone {
            border: 2px dashed rgba(108,99,255,0.3);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(108,99,255,0.03);
            position: relative;
        }
        .upload-zone:hover { border-color: var(--primary); background: rgba(108,99,255,0.08); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
        .upload-icon { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.3rem; }
        .upload-text { font-size: 0.85rem; color: var(--muted); }
        .upload-text strong { color: var(--text); }

        /* Password strength */
        .strength-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-top: 0.5rem; overflow: hidden; }
        .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: all 0.3s; }

        .btn-register {
            width: 100%;
            padding: 0.95rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 8px 25px rgba(108,99,255,0.35);
            margin-top: 0.5rem;
        }
        .btn-register:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(108,99,255,0.45); }

        .already { text-align: center; color: var(--muted); font-size: 0.9rem; margin-top: 1.25rem; }
        .already a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .already a:hover { text-decoration: underline; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            .form-row { grid-template-columns: 1fr; }
            .register-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="register-card">
        <a th:href="@{/}" class="brand">Edu<span>Exam</span></a>

        <div th:if="${param.success}" class="alert-success">
            <i class="bi bi-check-circle-fill"></i>
            Account created! <a th:href="@{/login}" style="color:#6ee7b7;font-weight:600;">Login here →</a>
        </div>

        <h2 class="card-title">Create Account ✨</h2>
        <p class="card-sub">Join thousands of students already preparing smarter</p>

        <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <i class="bi bi-person-fill"></i>
                        <input type="text" class="form-control" th:field="*{fullName}" placeholder="Your full name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <div class="input-wrap">
                        <i class="bi bi-phone-fill"></i>
                        <input type="tel" class="form-control" th:field="*{mobileNumber}" placeholder="+91 9876543210">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email (your login ID)</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope-fill"></i>
                    <input type="email" class="form-control" th:field="*{username}" placeholder="you@email.com" required>
                </div>
                <p th:if="${#fields.hasErrors('username')}" class="text-danger" th:errors="*{username}"></p>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" class="form-control" th:field="*{password}" id="pwdInput" placeholder="Create a strong password" required oninput="checkStrength(this.value)">
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="form-group">
                <label>Profile Picture (optional)</label>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" name="profilePicFile" accept="image/png,image/jpeg" onchange="updateUpload(this)">
                    <div class="upload-icon"><i class="bi bi-cloud-arrow-up-fill"></i></div>
                    <div class="upload-text" id="uploadText"><strong>Click to upload</strong> or drag & drop<br>PNG, JPG up to 5MB</div>
                </div>
            </div>

            <button type="submit" class="btn-register">
                <i class="bi bi-rocket-takeoff-fill"></i> Create My Account
            </button>
        </form>

        <div class="already">
            Already have an account? <a th:href="@{/login}">Sign in →</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
        const widths = ['20%','40%','60%','80%','100%'];
        fill.style.width = score > 0 ? widths[score-1] : '0';
        fill.style.background = score > 0 ? colors[score-1] : 'transparent';
    }
    function updateUpload(input) {
        const text = document.getElementById('uploadText');
        if (input.files && input.files[0]) {
            text.innerHTML = '<strong style="color:#10b981"><i class="bi bi-check-circle-fill"></i> ' + input.files[0].name + '</strong>';
        }
    }
</script>
</body>
</html>
